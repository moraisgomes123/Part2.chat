name: .NET CI

on:
  push:
    branches: [ main, master ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore CybersecurityChatbot.slnx

    - name: Build Solution
      run: msbuild CybersecurityChatbot.slnx /p:Configuration=Release
